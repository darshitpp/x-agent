name: Sync CLI Updates

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  # Job 1: Per-CLI — install, snapshot diff, and check GitHub Releases
  check-cli:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - cli: codex
            install: "npm install -g @openai/codex"
            repo: openai/codex
          - cli: claude
            install: "npm install -g @anthropic-ai/claude-code"
            repo: anthropics/claude-code
          - cli: gemini
            install: "npm install -g @google/gemini-cli"
            repo: google-gemini/gemini-cli
          - cli: cursor
            install: "curl https://cursor.com/install -fsS | bash"
            repo: ""
          - cli: junie
            install: "curl -fsSL https://junie.jetbrains.com/install.sh | bash"
            repo: JetBrains/junie
          - cli: qwen
            install: "npm install -g @qwen-code/qwen"
            repo: QwenLM/qwen-code
          - cli: antigravity
            install: "npm install -g @antigravity/cli"
            repo: ""
    steps:
      - uses: actions/checkout@v4

      - name: Install CLI
        run: '${{ matrix.install }} 2>/dev/null || echo "SKIP: ${{ matrix.cli }} install failed"'
        continue-on-error: true

      - name: Run snapshot detection
        id: detect
        run: |
          set +e
          # shellcheck disable=SC1090,SC1091
          source ~/.bashrc 2>/dev/null || source ~/.profile 2>/dev/null || true
          export PATH="$HOME/.local/bin:$HOME/bin:$HOME/.junie/bin:$HOME/.cursor/bin:$PATH"
          mkdir -p ~/.gemini && echo '{}' > ~/.gemini/projects.json
          chmod +x scripts/detect-updates.sh
          if ./scripts/detect-updates.sh ${{ matrix.cli }}; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi
        continue-on-error: true

      - name: Check GitHub Releases
        if: matrix.repo != ''
        id: release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          LATEST=$(gh api repos/${{ matrix.repo }}/releases/latest --jq '.tag_name' 2>/dev/null || echo "unknown")
          SNAPSHOT_FILE="assets/${{ matrix.cli }}-snapshot.txt"
          STORED=$(grep -m1 'LAST_RELEASE=' "$SNAPSHOT_FILE" 2>/dev/null | cut -d= -f2 || echo "none")
          if [ "$LATEST" != "$STORED" ] && [ "$LATEST" != "unknown" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            sed -i '/^LAST_RELEASE=/d' "$SNAPSHOT_FILE" 2>/dev/null || true
            echo "LAST_RELEASE=$LATEST" >> "$SNAPSHOT_FILE"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi
        continue-on-error: true

      - name: Upload snapshot
        if: steps.detect.outputs.changed == 'true' || steps.release.outputs.changed == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: snapshot-${{ matrix.cli }}
          path: assets/${{ matrix.cli }}-snapshot.txt

  # Job 2: Collect changes and open a single PR
  open-pr:
    needs: check-cli
    runs-on: ubuntu-latest
    if: always()
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
        continue-on-error: true

      - name: Apply snapshot updates
        run: |
          shopt -s nullglob
          for f in *-snapshot.txt; do
            [ -f "$f" ] && cp "$f" "assets/$f"
          done

      - name: Check for changes and create PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          DEFAULT_BRANCH="${{ github.event.repository.default_branch }}"

          if git diff --quiet assets/; then
            echo "No changes detected"
            exit 0
          fi

          CHANGED_CLIS=$(git diff --name-only assets/ | sed 's|assets/||;s|-snapshot.txt||' | sort -u)
          BRANCH="cli-update/weekly"

          EXISTING=$(gh pr list --label "cli-update" --head "$BRANCH" --json number --jq '.[0].number' 2>/dev/null || echo "")

          git checkout -B "$BRANCH" origin/"$DEFAULT_BRANCH"

          for CLI in $CHANGED_CLIS; do
            git add "assets/${CLI}-snapshot.txt"
          done

          CLI_LIST=$(echo "$CHANGED_CLIS" | tr '\n' ', ' | sed 's/,$//')
          git commit -m "chore: update CLI snapshots for ${CLI_LIST}" || exit 0
          git push origin "$BRANCH" --force

          if [ -n "$EXISTING" ]; then
            echo "Updated existing PR #${EXISTING}"
          else
            PR_BODY="## Summary
          Snapshots updated for: ${CLI_LIST}

          ## Action Required
          For each updated CLI:
          - Review version matrix in \`references/cli-<name>.md\`
          - Check for new/changed CLI flags
          - Verify tier classification for any new models"

            gh pr create \
              --title "chore: update CLI snapshots (${CLI_LIST})" \
              --body "$PR_BODY" \
              --label "cli-update"
          fi
